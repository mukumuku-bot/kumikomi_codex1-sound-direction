<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#c72c6b" />
    <title>手の形・指ハートテスト</title>
    <link rel="stylesheet" href="./styles.css?v=finger-heart-1" />
  </head>
  <body>
    <main class="hand-test">
      <a class="back-link" href="../#check">← 動作確認へ戻る</a>

      <header class="page-heading">
        <p class="eyebrow">Hand Gesture</p>
        <h1>手の形・指ハートテスト</h1>
        <p>内カメラの映像から手の21点を検出し、親指と人差し指で作る指ハートを認識します。</p>
      </header>

      <section class="camera-panel" aria-labelledby="cameraTitle">
        <div class="camera-view">
          <video id="video" playsinline muted autoplay></video>
          <canvas id="overlay" aria-hidden="true"></canvas>
          <p id="cameraMessage" class="camera-message">「内カメラを開始」を押してください</p>
          <div id="heartReaction" class="heart-reaction" role="status" aria-live="polite">
            <span class="heart-symbol">♡</span>
            <strong>指ハート！</strong>
          </div>
          <div id="heartParticles" class="heart-particles" aria-hidden="true"></div>
        </div>

        <div class="status-grid" aria-label="認識状態">
          <div>
            <span>モデル</span>
            <strong id="modelStatus">待機中</strong>
          </div>
          <div>
            <span>手の検出</span>
            <strong id="handStatus">未検出</strong>
          </div>
          <div id="gestureCard">
            <span>ジェスチャー</span>
            <strong id="gestureStatus">待機中</strong>
          </div>
        </div>

        <div class="actions">
          <button id="startButton" class="primary-button" type="button">内カメラを開始</button>
          <button id="stopButton" class="secondary-button" type="button" disabled>停止</button>
        </div>
      </section>

      <section class="gesture-guide" aria-labelledby="guideTitle">
        <h2 id="guideTitle">指ハートの作り方</h2>
        <ol>
          <li>手のひらをカメラに向けます。</li>
          <li>中指・薬指・小指を軽く曲げます。</li>
          <li>人差し指と親指の先を交差させ、小さな「♡」を作ります。</li>
          <li>認識されるまで約1秒、その形を保ちます。</li>
        </ol>
        <p>照明が明るく、手全体が画面に入る距離で試してください。</p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.min.js"></script>
    <script src="./app.js?v=finger-heart-1"></script>
  </body>
</html>
